core.party.help=<gray><strikethrough>-=========-<reset> <yellow><bold>Party Help <gray><strikethrough>-=========-<reset>\
<newline><white>-/party invite <player> <gray>-> <green>Invites the specified player to your party.\
<newline><white>-/party accept <player> <gray>-> <green>Accepts an invitation from the specified player.\
<newline><white>-/party deny <player> <gray>-> <green>Rejects the invitation from the specified player.\
<newline><white>-/party setOwner <player> <gray>-> <green>Makes the specified player the party leader.\
<newline><white>-/party kick <player> <gray>-> <green>Kicks the specified player to your party.\
<newline><white>-/party disband <gray>-> <green>Disbands the party.\
<newline><white>-/party info <gray>-> <green>Shows the status of the party.\
<newline><white>-/party leave <gray>-> <green>Leaves the party.\
<newline><white>-/party chat <gray>-> <green>Toggles the party chat.\
<newline><white>-/party help <gray>-> <green>Shows this message.
