    # MSG -> Sends message to player (supports chat colors and hex colors) EX: MSG "&aHi! 6&lThis is lang message."
    # MSG_KEYED -> Sends msg according to the player's language EX: MSG_KEYED "messages.lang"
    # SOUND -> Plays a sound.[SOUND;volume;pitch] EX: SOUND BLOCK_NOTE_PLING;1;0.5
    # SOUND_KEYED -> Plays a sound from 'sounds.yml' EX: SOUND_KEYED click
    # COMMAND -> Executes a command by the player. EX: COMMAND minecraft:clear <PLAYER>
    # CONSOLE -> Executes a command by the console. EX: CONSOLE minecraft:kick <PLAYER>
